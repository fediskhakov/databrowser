name: Deploy to GitHub Pages

# Publishes a selected subset of files from `main` to GitHub Pages.
# One-time setup: repo Settings → Pages → Build and deployment → Source =
# "GitHub Actions". After that, every push to main (re)deploys the site.

on:
  push:
    branches: [main]
  workflow_dispatch:        # allow manual runs from the Actions tab

# Permissions required by the official Pages deploy actions.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment; don't cancel an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Assemble the site (publish files + build the index page)
        run: |
          set -euo pipefail

          # ===== Files to publish (paths relative to the repo root). EDIT ME. =====
          FILES=(
            "json/json-browser.html"      # the json viewer app
          )

          # ===== Landing page: one entry per utility, "link|Title|Description". ====
          # `link` is relative to the site root — normally a published file's basename.
          UTILS=(
            "json-browser.html|JSON DB Viewer|Browse, filter, facet, and share views of any JSON dataset — all in the browser."
          )
          SITE_TITLE="Data Table Browsers"
          SITE_LEAD="Self-contained, dependency-free tools for browsing data tables. Pick one:"
          # ========================================================================

          rm -rf _site && mkdir -p _site
          for f in "${FILES[@]}"; do
            if [[ ! -f "$f" ]]; then
              echo "::error::listed file not found in repo: $f"
              exit 1
            fi
            cp "$f" "_site/$(basename "$f")"
          done

          # generate a simple index.html that lists the utilities with links
          cat > _site/index.html <<HTML
          <!doctype html>
          <html lang="en">
          <head>
          <meta charset="utf-8">
          <meta name="viewport" content="width=device-width, initial-scale=1">
          <title>${SITE_TITLE}</title>
          <style>
          body{font:16px/1.55 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;color:#1d2330;background:#f4f5f7;margin:0;padding:48px 20px}
          main{max-width:680px;margin:0 auto}
          h1{font-size:24px;margin:0 0 6px}
          p.lead{color:#6b7280;margin:0 0 26px}
          ul{list-style:none;padding:0;margin:0}
          li{background:#fff;border:1px solid #e3e6ea;border-radius:10px;padding:14px 16px;margin-bottom:12px}
          li a{font-size:17px;font-weight:600;color:#2563eb;text-decoration:none}
          li a:hover{text-decoration:underline}
          li .d{display:block;color:#6b7280;font-size:14px;margin-top:3px}
          footer{max-width:680px;margin:26px auto 0;color:#9aa0aa;font-size:13px}
          </style>
          </head>
          <body>
          <main>
          <h1>${SITE_TITLE}</h1>
          <p class="lead">${SITE_LEAD}</p>
          <ul>
          HTML

          for u in "${UTILS[@]}"; do
            IFS='|' read -r link title desc <<<"$u"
            printf '<li><a href="%s">%s</a><span class="d">%s</span></li>\n' "$link" "$title" "$desc" >> _site/index.html
          done

          cat >> _site/index.html <<'HTML'
          </ul>
          </main>
          <footer>Built from the <code>main</code> branch · MIT licensed</footer>
          </body>
          </html>
          HTML

          echo "Site contents:"
          ls -la _site
          echo "--- index.html ---"
          cat _site/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
